<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight">CarAI</span>
                </div>
                <div class="hidden md:flex items-center space-x-8 text-sm font-medium">
                    <a href="#" class="text-indigo-600">Predict</a>
                    <a href="#" class="text-slate-600 hover:text-indigo-600">History</a>
                    <a href="#" class="text-slate-600 hover:text-indigo-600">Analytics</a>
                    <button class="bg-indigo-600 text-white px-4 py-2 rounded-full hover:bg-indigo-700 transition">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">
                Smart Valuation Engine
            </h1>
            <p class="mt-4 text-xl text-slate-600">
                Precision car price estimation powered by Random Forest & XGBoost.
            </p>
        </div>

        <!-- Prediction Form -->
        <div x-data="{ 
            loading: false, 
            result: null, 
            error: null,
            async submitForm() {
                this.loading = true;
                this.result = null;
                this.error = null;
                
                // Mocking API call for demonstration
                setTimeout(() => {
                    this.loading = false;
                    this.result = 5.84;
                }, 1500);
            }
        }" class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100">
            
            <form @submit.prevent="submitForm()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Year -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Manufacturing Year</label>
                    <input type="number" required placeholder="e.g. 2018" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                </div>

                <!-- Price -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Showroom Price (Lakhs)</label>
                    <input type="number" step="0.01" required placeholder="e.g. 9.5" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                </div>

                <!-- KMS -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Kilometers Driven</label>
                    <input type="number" required placeholder="e.g. 25000" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                </div>

                <!-- Owners -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Previous Owners</label>
                    <select class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        <option value="0">0 (First Hand)</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3+</option>
                    </select>
                </div>

                <!-- Categories -->
                <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Fuel Type</label>
                        <div class="flex space-x-2">
                            <label class="flex-1 text-center py-2 border rounded-xl cursor-pointer hover:bg-slate-50">
                                <input type="radio" name="fuel" value="Petrol" class="hidden"> Petrol
                            </label>
                            <label class="flex-1 text-center py-2 border rounded-xl cursor-pointer hover:bg-slate-50">
                                <input type="radio" name="fuel" value="Diesel" class="hidden"> Diesel
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Transmission</label>
                        <div class="flex space-x-2">
                            <label class="flex-1 text-center py-2 border rounded-xl cursor-pointer hover:bg-slate-50">
                                <input type="radio" name="trans" value="Manual" class="hidden"> Manual
                            </label>
                            <label class="flex-1 text-center py-2 border rounded-xl cursor-pointer hover:bg-slate-50">
                                <input type="radio" name="trans" value="Auto" class="hidden"> Auto
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Seller Type</label>
                        <div class="flex space-x-2">
                            <label class="flex-1 text-center py-2 border rounded-xl cursor-pointer hover:bg-slate-50">
                                <input type="radio" name="seller" value="Dealer" class="hidden"> Dealer
                            </label>
                            <label class="flex-1 text-center py-2 border rounded-xl cursor-pointer hover:bg-slate-50">
                                <input type="radio" name="seller" value="Ind" class="hidden"> Ind.
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="md:col-span-2 mt-4">
                    <button type="submit" :disabled="loading" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition flex items-center justify-center space-x-2">
                        <template x-if="!loading">
                            <span>Calculate Valuation</span>
                        </template>
                        <template x-if="loading">
                            <div class="flex items-center">
                                <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                                Running ML Models...
                            </div>
                        </template>
                    </button>
                </div>
            </form>

            <!-- Result Display -->
            <template x-if="result">
                <div class="mt-12 p-8 bg-indigo-50 rounded-3xl border border-indigo-100 text-center animate__animated animate__zoomIn">
                    <p class="text-indigo-600 font-bold uppercase tracking-widest text-xs mb-2">Estimated Market Value</p>
                    <h2 class="text-5xl font-black text-indigo-900" x-text="'₹ ' + result + ' Lakhs'"></h2>
                    <p class="mt-4 text-indigo-700/70 text-sm">Confidence Score: 94.2% based on current market trends.</p>
                </div>
            </template>
        </div>
    </main>

    <footer class="text-center py-12 text-slate-400 text-sm">
        © 2024 Enterprise Car AI Prediction System. All Rights Reserved.
    </footer>

</body>
</html>
